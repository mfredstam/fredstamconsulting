<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Image</title>
    <style>
      @font-face {
        font-family: "Inter";
        src: url("fonts/inter-regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: "Inter";
        src: url("fonts/inter-medium.woff2") format("woff2");
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: "Inter";
        src: url("fonts/inter-semibold.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #1a1d23;
        color: #d0d5dd;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 72px 80px;
        position: relative;
      }

      .accent-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: #4a6fa5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #252930;
        border: 1px solid #333840;
        border-radius: 8px;
        padding: 10px 18px;
        margin-bottom: 36px;
        width: fit-content;
      }

      .badge-icon {
        width: 28px;
        height: 28px;
        background: #4a6fa5;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .badge-text {
        font-size: 15px;
        font-weight: 500;
        color: #8b939e;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .company-name {
        font-size: 72px;
        font-weight: 600;
        color: #d0d5dd;
        line-height: 1.1;
        letter-spacing: -0.02em;
        margin-bottom: 20px;
      }

      .tagline {
        font-size: 28px;
        font-weight: 400;
        color: #8b939e;
        line-height: 1.4;
        max-width: 700px;
      }

      .accent-line {
        position: absolute;
        left: 80px;
        bottom: 72px;
        width: 48px;
        height: 3px;
        background: #3d8b85;
        border-radius: 2px;
      }

      .url {
        position: absolute;
        right: 80px;
        bottom: 72px;
        font-size: 18px;
        font-weight: 500;
        color: #8b939e;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <div class="accent-bar"></div>

    <div class="badge">
      <div class="badge-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 32 32"
          fill="none"
        >
          <rect
            x="10"
            y="10"
            width="12"
            height="12"
            rx="1.5"
            stroke="#fff"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <line x1="13" y1="10" x2="13" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="19" y1="10" x2="19" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="13" y1="22" x2="13" y2="26" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="19" y1="22" x2="19" y2="26" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="10" y1="13" x2="6" y2="13" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="10" y1="16" x2="6" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="10" y1="19" x2="6" y2="19" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="22" y1="13" x2="26" y2="13" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="22" y1="16" x2="26" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
          <line x1="22" y1="19" x2="26" y2="19" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>
      <span class="badge-text">Embedded Software</span>
    </div>

    <h1 class="company-name">Fredstam Consulting</h1>
    <p class="tagline">Specialist Embedded Software Consulting</p>

    <div class="accent-line"></div>
    <span class="url">fredstamconsulting.se</span>
  </body>
</html>
